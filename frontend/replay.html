<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>TraceMap Replay</title>

    <style>
        body {
            margin: 0;
            width: 100%;
            height: auto;
            overflow: auto;
            background: #111;
            /* cursor: none; */
        }

        #cursor {
            width: 20px;
            height: 20px;
            background: red;
            border-radius: 50%;
            /* position: fixed;0 */
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.08s linear;
        }

        #controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 99999;
        }

        button {
            padding: 10px 18px;
            margin-left: 10px;
            border: none;
            background: #222;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            font-size: 14px;
        }

        button:hover {
            background: #444;
        }

        #sessionScreenshot {

            position: absolute;

            top: 0;
            left: 0;

            width: 100vw;
            height: auto;

            z-index: 1;

        }

        #heatmapLayer {

            position: absolute;

            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            pointer-events: none;

            z-index: 2;

        }

        /* 
        #analyticsPanel {

            position: fixed;

            top: 90px;

            right: 20px;

            width: 260px;

            background: rgba(20, 20, 20, 0.95);

            color: white;

            padding: 15px;

            border-radius: 12px;

            z-index: 99999;

        } */

        #analyticsPanel {

            position: fixed;

            top: 90px;

            right: 20px;

            width: 260px;

            max-height: calc(100vh - 120px);

            overflow-y: auto;

            background: rgba(20, 20, 20, 0.95);

            color: white;

            padding: 15px;

            border-radius: 12px;

            z-index: 99999;

        }

        #analyticsPanel::-webkit-scrollbar {
            width: 6px;
        }

        #analyticsPanel::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 10px;
        }

        #analyticsPanel h3 {

            margin-top: 0;

        }

        .ripple {
            width: 20px;
            height: 20px;
            border: 2px solid red;
            border-radius: 50%;
            /* position: fixed; */
            position: absolute;
            pointer-events: none;
            z-index: 9998;
            animation: rippleAnim 0.6s ease-out forwards;
        }

        @keyframes rippleAnim {

            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(4);
                opacity: 0;
            }

        }
    </style>
</head>

<body>

    <img id="sessionScreenshot">

    <div id="heatmapLayer"></div>

    <div id="controls">

        <button id="playBtn">Play</button>
        <button id="pauseBtn">Pause</button>
        <button id="speed1x">1x</button>
        <button id="speed2x">2x</button>
        <button id="speed4x">4x</button>
        <button id="toggleAnalytics">
            Analytics
        </button>

    </div>

    <div id="analyticsPanel">

        <h3>Session Analytics</h3>

        <p>Clicks: <span id="clickCount">0</span></p>

        <p>Dead Clicks: <span id="deadClickCount">0</span></p>

        <p>Rage Clicks: <span id="rageClickCount">0</span></p>

        <p>Duration: <span id="duration">0s</span></p>

        <p>Scroll Depth: <span id="maxScroll">0%</span></p>

        <p>Form Started: <span id="formStarted">No</span></p>

        <p>Form Submitted: <span id="formSubmitted">No</span></p>

        <p>Completion Time: <span id="completionTime">0s</span></p>

        <h4>Session Insights</h4>

        <ul id="sessionInsights">
        </ul>

    </div>

    <div id="cursor"></div>

    <script>

        const cursor = document.getElementById("cursor");

        const params = new URLSearchParams(window.location.search);

        const sessionId = params.get("sessionId");

        async function loadScreenshot() {

            try {

                const response = await fetch(
                    `http://localhost:5000/screenshot/${sessionId}`
                );

                const screenshot =
                    await response.json();

                console.log(screenshot);

                document
                    .getElementById(
                        "sessionScreenshot"
                    )
                    .src =
                    `http://localhost:5000/uploads/${screenshot.imagePath}`;

            } catch (error) {

                console.log(error);

            }

        }

        async function loadReplayHeatmap() {

            const response = await fetch(
                `http://localhost:5000/heatmap/${sessionId}`
            );

            const events = await response.json();

            const layer =
                document.getElementById(
                    "heatmapLayer"
                );

            events.forEach((event) => {

                const dot =
                    document.createElement("div");

                dot.style.position = "absolute";
                dot.style.borderRadius = "50%";
                dot.style.pointerEvents = "none";
                dot.style.transform = "translate(-50%, -50%)";
                dot.style.zIndex = "9999";

                if (event.eventType === "click") {

                    dot.style.left =
                        event.x + "px";

                    dot.style.top =
                        (
                            event.y +
                            (event.scrollY || 0)
                        ) + "px";

                    dot.style.width = "50px";
                    dot.style.height = "50px";

                    dot.style.background =
                        "rgba(255,0,0,0.3)";

                    dot.style.filter =
                        "blur(15px)";

                    dot.style.zIndex = "10000";

                }

                else if (event.eventType === "mousemove") {

                    dot.style.left =
                        event.x + "px";

                    dot.style.top =
                        (
                            event.y +
                            (event.scrollY || 0)
                        ) + "px";

                    dot.style.width = "30px";
                    dot.style.height = "30px";

                    dot.style.background =
                        "rgba(0,0,255,0.4)";

                    dot.style.filter =
                        "blur(8px)";

                    dot.style.zIndex = "9999";
                }

                else if (
                    event.eventType ===
                    "deadclick"
                ) {

                    dot.style.left =
                        event.x + "px";

                    dot.style.top =
                        (
                            event.y +
                            (event.scrollY || 0)
                        ) + "px";

                    dot.style.width = "70px";

                    dot.style.height = "70px";

                    dot.style.background =
                        "rgba(255,0,255,0.55)";

                    dot.style.filter =
                        "blur(18px)";

                    dot.style.zIndex = "10002";

                }

                else if (event.eventType === "scroll") {

                    if (!event.scrollY) return;

                    dot.style.left = "50%";

                    dot.style.top =
                        event.scrollY + "px";

                    dot.style.width = "100px";
                    dot.style.height = "100px";

                    dot.style.background =
                        "rgba(0,255,0,0.4)";

                    dot.style.filter =
                        "blur(20px)";

                    dot.style.zIndex = "9998";
                }

                else {
                    return;
                }

                layer.appendChild(dot);

            });

        }

        async function loadReplay() {

            try {

                const response = await fetch(
                    `http://localhost:5000/session/${sessionId}`
                );

                const events = await response.json();

                const clickCount =
                    events.filter(
                        event =>
                            event.eventType ===
                            "click"
                    ).length;

                document.getElementById(
                    "clickCount"
                ).textContent =
                    clickCount;

                const deadClickCount =
                    events.filter(
                        event =>
                            event.eventType ===
                            "deadclick"
                    ).length;

                document.getElementById(
                    "deadClickCount"
                ).textContent =
                    deadClickCount;

                const rageClickCount =
                    await fetch(
                        `http://localhost:5000/rage-clicks/${sessionId}`
                    )
                        .then(res => res.json());

                document.getElementById(
                    "rageClickCount"
                ).textContent =
                    rageClickCount.length;

                const duration =
                    events.length
                        ? events[events.length - 1].timestamp -
                        events[0].timestamp
                        : 0;

                const seconds =
                    Math.floor(duration / 1000);

                document.getElementById(
                    "duration"
                ).textContent =
                    seconds + "s";

                const scrollEvents =
                    events.filter(
                        event =>
                            event.eventType ===
                            "scroll"
                    );

                const maxScroll =
                    scrollEvents.length
                        ? Math.max(
                            ...scrollEvents.map(
                                event =>
                                    event.scrollY || 0
                            )
                        )
                        : 0;

                const pageHeight =
                    scrollEvents.length
                        ? Math.max(
                            ...scrollEvents.map(
                                event =>
                                    event.pageHeight || 0
                            )
                        )
                        : 0;

                const scrollPercentage =
                    pageHeight > 0
                        ? Math.min(
                            Math.round(
                                (maxScroll / pageHeight) * 100
                            ),
                            100
                        )
                        : 0;

                document.getElementById(
                    "maxScroll"
                ).textContent =
                    scrollPercentage + "%";

                const formStartEvent =
                    events.find(
                        event =>
                            event.eventType ===
                            "formstart"
                    );

                const formSubmitEvent =
                    events.find(
                        event =>
                            event.eventType ===
                            "formsubmit"
                    );

                document.getElementById(
                    "formStarted"
                ).textContent =
                    formStartEvent ? "Yes" : "No";

                document.getElementById(
                    "formSubmitted"
                ).textContent =
                    formSubmitEvent ? "Yes" : "No";

                document.getElementById(
                    "completionTime"
                ).textContent =
                    formSubmitEvent
                        ? (
                            formSubmitEvent.completionTime /
                            1000
                        ).toFixed(1) + "s"
                        : "--";

                const insights = [];

                if (deadClickCount > 0) {

                    insights.push(
                        "User clicked unavailable elements."
                    );

                }

                if (rageClickCount > 0) {

                    insights.push(
                        "User showed signs of frustration."
                    );

                }

                if (duration > 60000) {

                    insights.push(
                        "User spent significant time on the page."
                    );

                }

                if (
                    clickCount > 20 &&
                    rageClickCount > 2
                ) {

                    insights.push(
                        "User actively interacted but encountered friction."
                    );

                }

                if (
                    duration > 120000 &&
                    maxScroll > 1000
                ) {

                    insights.push(
                        "User showed strong engagement with the content."
                    );

                }

                if (
                    clickCount < 3 &&
                    duration < 15000
                ) {

                    insights.push(
                        "User disengaged quickly and showed limited interaction."
                    );

                }

                if (maxScroll > 1000) {

                    insights.push(
                        "User explored deep sections of content."
                    );

                }

                if (insights.length === 0) {

                    insights.push(
                        "User navigated smoothly with no significant issues detected."
                    );

                }

                if (
                    formStartEvent &&
                    !formSubmitEvent
                ) {

                    insights.push(
                        "User started filling the form but did not submit it."
                    );

                }

                if (
                    formStartEvent &&
                    formSubmitEvent
                ) {

                    insights.push(
                        "User successfully completed the form."
                    );

                }

                if (
                    formSubmitEvent &&
                    formSubmitEvent.completionTime < 15000
                ) {

                    insights.push(
                        "User completed the form quickly with minimal friction."
                    );

                }

                else if (
                    formSubmitEvent &&
                    formSubmitEvent.completionTime < 45000
                ) {

                    insights.push(
                        "User completed the form in a reasonable amount of time."
                    );

                }

                else if (
                    formSubmitEvent
                ) {

                    insights.push(
                        "User spent significant time completing the form."
                    );

                }

                const insightList =
                    document.getElementById(
                        "sessionInsights"
                    );

                insightList.innerHTML = "";

                insights.forEach(insight => {

                    const li =
                        document.createElement("li");

                    li.textContent =
                        insight;

                    insightList.appendChild(li);

                });

                console.log(events);

                replayEvents(events);

            } catch (error) {

                console.log(error);

            }

        }

        function createRipple(x, y) {

            const ripple = document.createElement("div");

            ripple.classList.add("ripple");

            ripple.style.left = x - 10 + "px";
            ripple.style.top = y - 10 + "px";

            document.body.appendChild(ripple);

            setTimeout(() => {
                ripple.remove();
            }, 600);

        }

        let replayTimeouts = [];
        let isPaused = false;

        let replaySpeed = 0.3;

        function replayEvents(events) {

            replayTimeouts = [];

            events.forEach((event) => {

                const delay =
                    (event.timestamp - events[0].timestamp) * replaySpeed;

                const timeout = setTimeout(() => {

                    if (isPaused) return;

                    const screenshot =
                        document.getElementById("sessionScreenshot");

                    const scaleX =
                        screenshot.width /
                        screenshot.naturalWidth;

                    const scaleY =
                        screenshot.height /
                        screenshot.naturalHeight;

                    if (event.eventType === "scroll") {

                        window.scrollTo(
                            0,
                            event.scrollY
                        );

                    } else {

                        // cursor.style.left = event.x + "px";
                        cursor.style.left =
                            event.x + "px";

                        cursor.style.top =
                            (event.y + (event.scrollY || 0))
                            + "px";

                    }

                    if (event.eventType === "click") {

                        cursor.style.transform = "scale(1.8)";

                        createRipple(
                            event.x,
                            event.y + (event.scrollY || 0)
                        );

                        setTimeout(() => {
                            cursor.style.transform = "scale(1)";
                        }, 150);

                    }

                }, delay);

                replayTimeouts.push(timeout);

            });

        }

        document.getElementById("pauseBtn")
            .addEventListener("click", () => {

                isPaused = true;

                replayTimeouts.forEach((timeout) => {
                    clearTimeout(timeout);
                });

            });

        document.getElementById("playBtn")
            .addEventListener("click", () => {

                replayTimeouts.forEach((timeout) => {
                    clearTimeout(timeout);
                });

                isPaused = false;

                loadReplay();

            });

        document.getElementById("speed1x")
            .addEventListener("click", () => {

                replaySpeed = 1;

                console.log("1x Speed");

            });

        document.getElementById("speed2x")
            .addEventListener("click", () => {

                replaySpeed = 0.15;

                console.log("2x Speed");

            });

        document.getElementById("speed4x")
            .addEventListener("click", () => {

                replaySpeed = 0.03;

                console.log("4x Speed");

            });

        async function loadRageClicks() {

            const response = await fetch(
                `http://localhost:5000/rage-clicks/${sessionId}`
            );

            const rageClicks = await response.json();

            console.log("RAGE CLICK SAMPLE", rageClicks[0]);

            const layer =
                document.getElementById("heatmapLayer");

            rageClicks.forEach((click) => {

                const dot =
                    document.createElement("div");

                dot.style.position = "absolute";

                dot.style.left =
                    click.x + "px";

                dot.style.top =
                    (
                        click.y +
                        (click.scrollY || 0)
                    ) + "px";

                dot.style.width = "80px";

                dot.style.height = "80px";

                dot.style.borderRadius = "50%";

                dot.style.background =
                    "rgba(255,165,0,0.45)";

                dot.style.filter =
                    "blur(20px)";

                dot.style.transform =
                    "translate(-50%, -50%)";

                dot.style.pointerEvents = "none";

                dot.style.zIndex = "10001";

                layer.appendChild(dot);

            });

        }

        document
            .getElementById(
                "toggleAnalytics"
            )
            .addEventListener(
                "click",
                () => {

                    const panel =
                        document.getElementById(
                            "analyticsPanel"
                        );

                    if (
                        panel.style.display ===
                        "none"
                    ) {

                        panel.style.display =
                            "block";

                    } else {

                        panel.style.display =
                            "none";

                    }

                }
            );

        loadScreenshot();

        loadReplayHeatmap();

        loadRageClicks();

        // loadReplay();

    </script>

</body>

</html>
